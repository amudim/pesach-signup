function App() {
  const [session, setSession] = useState(null);
  const [profile, setProfile] = useState(null);
  const [screen,  setScreen]  = useState("landing");
  const [loading, setLoading] = useState(true);
  const isRecoveryFlow = { current: false };

  useEffect(() => {
    // Handle host accept/decline from email link
    const urlParams = new URLSearchParams(window.location.search);
    const action = urlParams.get("action");
    const signupId = urlParams.get("signup_id");
    if (action && signupId && (action === "accept" || action === "decline")) {
      window.history.replaceState(null, "", window.location.pathname);
      fetch("https://bemzfrxknylymekoqkpo.supabase.co/functions/v1/host-respond", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer sb_publishable_csGVnhQfFbN25w0C2CQy1w_Z0cSM2HJ` },
        body: JSON.stringify({ signup_id: parseInt(signupId), action }),
      }).then(() => { setScreen("action_done"); setLoading(false); });
      return;
    }

    // Check URL hash for password recovery BEFORE anything else
    const hash = window.location.hash;
    const params = new URLSearchParams(hash.replace("#", "?"));
    const type = params.get("type");
    if (type === "recovery") {
      isRecoveryFlow.current = true;
      window.history.replaceState(null, "", window.location.pathname);
      setScreen("set_password");
      setLoading(false);
      supabase.auth.getSession().then(({ data: { session: s } }) => { setSession(s); });
      return;
    }

    supabase.auth.getSession().then(({ data: { session: s } }) => {
      setSession(s);
      if (s && !isRecoveryFlow.current) loadProfile(s.user.id);
      else if (!s) setLoading(false);
    });

    const { data: { subscription } } = supabase.auth.onAuthStateChange((event, s) => {
      if (event === "PASSWORD_RECOVERY") {
        isRecoveryFlow.current = true;
        setSession(s);
        setScreen("set_password");
        setLoading(false);
        return;
      }
      // SIGNED_IN fires after PASSWORD_RECOVERY — block it from redirecting
      if (event === "SIGNED_IN" && isRecoveryFlow.current) {
        setSession(s);
        return;
      }
      if (event === "USER_UPDATED" && isRecoveryFlow.current) {
        // Password was just changed — now safe to load profile
        isRecoveryFlow.current = false;
        setSession(s);
        if (s) loadProfile(s.user.id);
        return;
      }
      setSession(s);
      if (s) loadProfile(s.user.id);
      else { setProfile(null); setScreen("landing"); setLoading(false); }
    });
    return () => subscription.unsubscribe();
  }, []);

  const loadProfile = async (authId) => {
    const { data } = await supabase.from("users").select("*").eq("auth_user_id", authId).single();
    setProfile(data);
    if (data) setScreen(data.role === "host" ? "host_dashboard" : "guest_dashboard");
    else setScreen("register");
    setLoading(false);
  };

  const logout = async () => { await supabase.auth.signOut(); setProfile(null); setScreen("landing"); };

  if (loading) return (
    <>
      <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@400;500;700&family=Prompt:wght@700;800&display=swap" rel="stylesheet" />
      <div style={{ minHeight:"100vh", background:C.bg, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:F.body, color:C.muted }}>Loading…</div>
    </>
  );

  return (
    <>
      <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@400;500;700&family=Prompt:wght@700;800&display=swap" rel="stylesheet" />
      <div style={{ minHeight:"100vh", background:C.bg, fontFamily:F.serif, color:C.cream, position:"relative" }}>
        <div style={{ position:"fixed", inset:0, opacity:0.03, pointerEvents:"none", backgroundImage:`repeating-linear-gradient(60deg,${C.gold} 0,${C.gold} 1px,transparent 0,transparent 50%)`, backgroundSize:"24px 24px" }} />
        {session && (
          <div style={{ borderBottom:`1px solid ${C.border}`, padding:"10px 24px", display:"flex", justifyContent:"space-between", alignItems:"center", position:"relative", zIndex:10, background:C.card }}>
            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              <AmudimLogo size={48} />
              <div style={{ fontFamily:F.body, color:C.muted, fontSize:"0.72rem" }}>Pesach Meal Signup · 5786</div>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
              <a href="https://donateamudim.org/" target="_blank" rel="noopener noreferrer"
                style={{ fontSize:"0.78rem", color:C.blue, fontFamily:F.body, textDecoration:"none", border:`1px solid ${C.blue}`, padding:"5px 12px", borderRadius:20, whiteSpace:"nowrap" }}>
                ❤️ Donate
              </a>
              <span style={{ fontSize:"0.82rem", color:C.muted, fontFamily:F.body }}>{profile?.family_name || profile?.name || ""}</span>
              <button onClick={logout} style={{ ...bG, padding:"6px 14px", fontSize:"0.75rem" }}>Sign Out</button>
            </div>
          </div>
        )}
        <div style={{ maxWidth:800, margin:"0 auto", padding:"0 20px 80px", position:"relative", zIndex:1 }}>
          {screen === "action_done"     && <ActionDone />}
          {screen === "landing"         && <Landing setScreen={setScreen} />}
          {screen === "signup"          && <SignupFlow setScreen={setScreen} />}
          {screen === "register"        && <Register session={session} setProfile={setProfile} setScreen={setScreen} />}
          {screen === "login"           && <Login setScreen={setScreen} />}
          {screen === "forgot"          && <ForgotPassword setScreen={setScreen} />}
          {screen === "set_password"    && <SetNewPassword setScreen={setScreen} loadProfile={loadProfile} session={session} />}
          {screen === "privacy"         && <PrivacyPolicy setScreen={setScreen} />}
          {screen === "disclaimer"      && <Disclaimer setScreen={setScreen} />}
          {screen === "host_dashboard"  && <HostDashboard profile={profile} setScreen={setScreen} />}
          {screen === "guest_dashboard" && <GuestDashboard profile={profile} setScreen={setScreen} />}
          {screen === "admin"           && <AdminDashboard setScreen={setScreen} logout={logout} />}
        </div>
      </div>
    </>
  );
}

// ── REGISTER ───────────────────────────────────────────────────────────────
function Register({ session, setProfile, setScreen }) {
  const [role, setRole] = useState("");
  const [form, setForm] = useState({ name:"", family_name:"", phone:"", password:"" });
  const [errors, setErrors] = useState({});
  const [loading, setLoading] = useState(false);

  const validate = () => {
    const e = {};
    if (!role) e.role = "Please select a role";
    if (!form.name.trim()) e.name = "Required";
    if (role === "host" && !form.family_name.trim()) e.family_name = "Required";
    if (!form.phone.trim()) e.phone = "Required";
    if (!session && form.password.length < 6) e.password = "Minimum 6 characters";
    return e;
  };

  const submit = async () => {
    const e = validate(); setErrors(e);
    if (Object.keys(e).length) return;
    setLoading(true);
    const authId = session?.user?.id;
    if (!authId) { setErrors({ role:"Session error — please sign in first" }); setLoading(false); return; }
    const { data, error } = await supabase.from("users").insert([{
      auth_user_id: authId, role, name: form.name,
      family_name: role === "host" ? form.family_name : form.name,
      phone: form.phone,
      email: session.user.email,
    }]).select().single();
    if (error) { setErrors({ role:"Something went wrong. Please try again." }); setLoading(false); return; }
    setProfile(data);
    setScreen(role === "host" ? "host_dashboard" : "guest_dashboard");
    setLoading(false);
  };

  return (
    <div style={{ maxWidth:480, margin:"48px auto 0" }}>
      <button onClick={() => setScreen("landing")} style={{ background:"none", border:"none", color:C.muted, fontSize:"0.82rem", cursor:"pointer", fontFamily:F.body, display:"flex", alignItems:"center", gap:4, marginBottom:16, padding:0 }}>← Back</button>
      <PageHeader title="Complete Your Profile" sub="Almost there — tell us a bit about yourself" />
      <div style={cS}>
        <Field label="I am a…" error={errors.role}>
          <div style={{ display:"flex", gap:12 }}>
            {["host","guest"].map(r => (
              <div key={r} onClick={() => setRole(r)} style={{ flex:1, padding:"14px", borderRadius:8, cursor:"pointer", textAlign:"center", border:`2px solid ${role===r?C.gold:C.border}`, background:role===r?`${C.gold}18`:C.bg, transition:"all 0.15s" }}>
                <div style={{ fontSize:"1.4rem", marginBottom:4 }}>{r==="host"?"🏠":"🙏"}</div>
                <div style={{ fontFamily:F.display, fontSize:"0.82rem", color:role===r?C.goldLt:C.muted, textTransform:"capitalize", letterSpacing:"0.1em" }}>{r==="host"?"Host a Meal":"Find a Meal"}</div>
              </div>
            ))}
          </div>
        </Field>
        <Field label="Your Full Name" error={errors.name}>
          <input style={iS(errors.name)} value={form.name} onChange={e => setForm(f => ({ ...f, name:e.target.value }))} placeholder="Yisrael Ploni" />
        </Field>
        {role === "host" && (
          <Field label="Family Name (shown to guests)" error={errors.family_name}>
            <input style={iS(errors.family_name)} value={form.family_name} onChange={e => setForm(f => ({ ...f, family_name:e.target.value }))} placeholder="The Cohen Family" />
          </Field>
        )}
        <Field label="Phone" error={errors.phone}>
          <input style={iS(errors.phone)} value={form.phone} onChange={e => setForm(f => ({ ...f, phone:e.target.value }))} placeholder="(718) 555-1212 or (058) 555-1212" />
        </Field>
        <button style={{ ...bP, width:"100%", marginTop:8, opacity:loading?0.6:1 }} onClick={submit} disabled={loading}>{loading?"Saving…":"Complete Registration →"}</button>
        <p style={{ fontSize:"0.75rem", color:C.muted, fontFamily:F.body, marginTop:14, lineHeight:1.6, textAlign:"center" }}>
          By registering, you agree to our{" "}
          <span style={{ color:C.blue, cursor:"pointer", textDecoration:"underline" }} onClick={() => setScreen("privacy")}>Privacy Policy</span>
          {" "}and{" "}
          <span style={{ color:C.blue, cursor:"pointer", textDecoration:"underline" }} onClick={() => setScreen("disclaimer")}>Disclaimer</span>.
        </p>
      </div>
    </div>
  );
}

// ── LOGIN ──────────────────────────────────────────────────────────────────
function Login({ setScreen }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const [mode, setMode] = useState("user");
  const [adminPw, setAdminPw] = useState("");

  const submit = async () => {
    if (mode === "admin") { setScreen("admin"); return; }
    setLoading(true); setError("");
    const { error: err } = await supabase.auth.signInWithPassword({ email, password });
    if (err) setError("Email or password is incorrect");
    setLoading(false);
  };

  return (
    <div style={{ maxWidth:420, margin:"48px auto 0" }}>
      <button onClick={() => setScreen("landing")} style={{ background:"none", border:"none", color:C.muted, fontSize:"0.82rem", cursor:"pointer", fontFamily:F.body, display:"flex", alignItems:"center", gap:4, marginBottom:16, padding:0 }}>← Back</button>
      <PageHeader title="Sign In" sub="Welcome back" />
      <div style={cS}>
        <div style={{ display:"flex", gap:8, marginBottom:24 }}>
          {["user","admin"].map(m => (
            <button key={m} onClick={() => { setMode(m); setError(""); }} style={{ ...(mode===m?bP:bG), padding:"8px 18px", fontSize:"0.78rem", flex:1 }}>{m==="user"?"Host / Guest":"Admin"}</button>
          ))}
        </div>
        {mode === "user" ? (
          <>
            <Field label="Email"><input style={iS(error)} value={email} onChange={e => { setEmail(e.target.value); setError(""); }} placeholder="you@email.com" /></Field>
            <Field label="Password"><input style={iS(error)} type="password" value={password} onChange={e => { setPassword(e.target.value); setError(""); }} onKeyDown={e => e.key==="Enter"&&submit()} placeholder="Your password" /></Field>
            {error && <Alert type="error">{error}</Alert>}
            <button style={{ ...bP, width:"100%", opacity:loading?0.6:1 }} onClick={submit} disabled={loading}>{loading?"Signing in…":"Sign In →"}</button>
            <div style={{ textAlign:"center", marginTop:16, fontSize:"0.85rem", color:C.muted }}>
              <span style={{ color:C.gold, cursor:"pointer" }} onClick={() => setScreen("forgot")}>Forgot password?</span>
              {" · "}
              <span style={{ color:C.gold, cursor:"pointer" }} onClick={() => setScreen("signup")}>Create account</span>
            </div>
          </>
        ) : (
          <>
            <Field label="Admin Password"><input style={iS(error)} type="password" value={adminPw} onChange={e => { setAdminPw(e.target.value); setError(""); }} onKeyDown={e => e.key==="Enter"&&(adminPw===ADMIN_PASSWORD?setScreen("admin"):setError("Incorrect password"))} placeholder="Admin password" /></Field>
            {error && <Alert type="error">{error}</Alert>}
            <button style={{ ...bP, width:"100%" }} onClick={() => adminPw===ADMIN_PASSWORD?setScreen("admin"):setError("Incorrect password")}>Enter →</button>
          </>
        )}
      </div>
    </div>
  );
}

// ── REGISTER WITH EMAIL (initial signup) ───────────────────────────────────
// We override the landing "Create Account" to do email+password first via Supabase Auth
// then redirect to profile completion. Handled by wrapping Register to first do auth.
function SignupFlow({ setScreen }) {
  const [step, setStep] = useState("auth");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [errors, setErrors] = useState({});
  const [loading, setLoading] = useState(false);
  const [msg, setMsg] = useState("");

  const submitAuth = async () => {
    const e = {};
    if (!email.includes("@")) e.email = "Valid email required";
    if (password.length < 6) e.password = "Minimum 6 characters";
    setErrors(e); if (Object.keys(e).length) return;
    setLoading(true);
    const { error } = await supabase.auth.signUp({ email, password });
    if (error) { setErrors({ email: error.message }); setLoading(false); return; }
    setLoading(false);
    // onAuthStateChange will fire and load profile → Register screen
  };

  return (
    <div style={{ maxWidth:420, margin:"48px auto 0" }}>
      <button onClick={() => setScreen("landing")} style={{ background:"none", border:"none", color:C.muted, fontSize:"0.82rem", cursor:"pointer", fontFamily:F.body, display:"flex", alignItems:"center", gap:4, marginBottom:16, padding:0 }}>← Back</button>
      <PageHeader title="Create Account" sub="Join Amudim's Pesach Meal Network" />
      <div style={cS}>
        <Field label="Email" error={errors.email}>
          <input style={iS(errors.email)} value={email} onChange={e => { setEmail(e.target.value); setErrors({}); }} placeholder="you@email.com" />
        </Field>
        <Field label="Password" error={errors.password}>
          <input style={iS(errors.password)} type="password" value={password} onChange={e => { setPassword(e.target.value); setErrors({}); }} onKeyDown={e => e.key==="Enter"&&submitAuth()} placeholder="Minimum 6 characters" />
        </Field>
        {msg && <Alert type="success">{msg}</Alert>}
        <button style={{ ...bP, width:"100%", opacity:loading?0.6:1 }} onClick={submitAuth} disabled={loading}>{loading?"Creating account…":"Continue →"}</button>
        <div style={{ textAlign:"center", marginTop:16, fontSize:"0.85rem", color:C.muted }}>
          Already have an account? <span style={{ color:C.gold, cursor:"pointer" }} onClick={() => setScreen("login")}>Sign in</span>
        </div>
      </div>
    </div>
  );
}

// ── SET NEW PASSWORD (after clicking reset link) ───────────────────────────
function SetNewPassword({ setScreen, loadProfile, session }) {
  const [password,  setPassword]  = useState("");
  const [password2, setPassword2] = useState("");
  const [error,     setError]     = useState("");
  const [loading,   setLoading]   = useState(false);
  const [done,      setDone]      = useState(false);

  const submit = async () => {
    if (password.length < 6)         { setError("Password must be at least 6 characters"); return; }
    if (password !== password2)      { setError("Passwords do not match"); return; }
    setLoading(true);
    const { error: err } = await supabase.auth.updateUser({ password });
    if (err) { setError(err.message); setLoading(false); return; }
    setDone(true);
    setLoading(false);
    // USER_UPDATED event in onAuthStateChange will handle the redirect
  };

  return (
    <div style={{ maxWidth:420, margin:"48px auto 0" }}>
      <button onClick={() => setScreen("landing")} style={{ background:"none", border:"none", color:C.muted, fontSize:"0.82rem", cursor:"pointer", fontFamily:F.body, display:"flex", alignItems:"center", gap:4, marginBottom:16, padding:0 }}>← Back</button>
      <PageHeader title="Set New Password" sub="Choose a new password for your account" />
      <div style={cS}>
        {done ? (
          <Alert type="success">✓ Password updated! Taking you to your dashboard…</Alert>
        ) : (
          <>
            <Field label="New Password" error={error}>
              <input style={iS(error)} type="password" value={password}
                onChange={e => { setPassword(e.target.value); setError(""); }}
                placeholder="Minimum 6 characters" />
            </Field>
            <Field label="Confirm New Password" error={error}>
              <input style={iS(error)} type="password" value={password2}
                onChange={e => { setPassword2(e.target.value); setError(""); }}
                onKeyDown={e => e.key === "Enter" && submit()}
                placeholder="Repeat your new password" />
            </Field>
            {error && <Alert type="error">{error}</Alert>}
            <button style={{ ...bP, width:"100%", opacity:loading?0.6:1 }} onClick={submit} disabled={loading}>
              {loading ? "Saving…" : "Set New Password →"}
            </button>
          </>
        )}
      </div>
    </div>
  );
}

// ── FORGOT PASSWORD ────────────────────────────────────────────────────────
function ForgotPassword({ setScreen }) {
  const [email, setEmail] = useState("");
  const [sent, setSent] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const submit = async () => {
    if (!email.includes("@")) { setError("Please enter a valid email"); return; }
    setLoading(true);
    const { error: err } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: "https://v0-react-supabase-app-rose-gamma.vercel.app",
    });
    if (err) setError(err.message);
    else setSent(true);
    setLoading(false);
  };

  return (
    <div style={{ maxWidth:420, margin:"48px auto 0" }}>
      <button onClick={() => setScreen("landing")} style={{ background:"none", border:"none", color:C.muted, fontSize:"0.82rem", cursor:"pointer", fontFamily:F.body, display:"flex", alignItems:"center", gap:4, marginBottom:16, padding:0 }}>← Back</button>

      <div style={cS}>
        {sent ? (
          <Alert type="success">✓ Reset link sent! Check your email and click the link to set a new password.</Alert>
        ) : (
          <>
            <Field label="Your Email" error={error}>
              <input style={iS(error)} value={email} onChange={e => { setEmail(e.target.value); setError(""); }} placeholder="you@email.com" onKeyDown={e => e.key==="Enter"&&submit()} />
            </Field>
            <button style={{ ...bP, width:"100%", opacity:loading?0.6:1 }} onClick={submit} disabled={loading}>{loading?"Sending…":"Send Reset Link →"}</button>

        <div style={{ textAlign:"center", marginTop:16 }}>
          <span style={{ color:C.gold, cursor:"pointer", fontSize:"0.85rem" }} onClick={() => setScreen("login")}>← Back to Sign In</span>
        </div>
      </div>
    </div>
  );
}

// ── HOST DASHBOARD ─────────────────────────────────────────────────────────
function HostDashboard({ profile, setScreen }) {
  const [myListings, setMyListings] = useState([]);
  const [signups,    setSignups]    = useState([]);
  const [loading,    setLoading]    = useState(true);
  const [showForm,   setShowForm]   = useState(false);
  const [editId,     setEditId]     = useState(null);
  const [saved,      setSaved]      = useState(false);

  const blank = { meals:{}, neighborhood:"", address:"", gebrokts:"", kitniyot:"", notes:"" };
  const [form,   setForm]   = useState(blank);
  const [errors, setErrors] = useState({});
  const [saving, setSaving] = useState(false);

  useEffect(() => { fetchData(); }, []);

  const fetchData = async () => {
    setLoading(true);
    const [{ data:l }, { data:s }] = await Promise.all([
      supabase.from("hosts").select("*").eq("user_id", profile.id),
      supabase.from("signups").select("*"),
    ]);
    setMyListings(l || []);
    setSignups(s || []);
    setShowForm(!l || l.length === 0);
    setLoading(false);
  };

  const startEdit = (listing) => {
    setForm({ meals: listing.meals || {}, neighborhood: listing.neighborhood || "", address: listing.address || "", gebrokts: listing.gebrokts || "", kitniyot: listing.kitniyot || "", notes: listing.notes || "" });
    setEditId(listing.id);
    setShowForm(true);
      };

  const toggleMeal = (mealId) => setForm(f => {
    const m = { ...f.meals };
    if (m[mealId]) delete m[mealId];
    else m[mealId] = { capacity:"1", gender:"", boys_cap:"1", girls_cap:"1" };
    return { ...f, meals:m };
  });

  const updateMealField = (mealId, field, val) => setForm(f => ({ ...f, meals:{ ...f.meals, [mealId]:{ ...f.meals[mealId], [field]:val } } }));

  const validate = () => {
    const e = {};
    if (!form.neighborhood.trim()) e.neighborhood = "Required";
    if (!form.address.trim()) e.address = "Required — guests need to know where to go";
    if (!form.gebrokts) e.gebrokts = "Required";
    if (!form.kitniyot) e.kitniyot = "Required";
    if (Object.keys(form.meals).length === 0) e.meals = "Select at least one meal";
    Object.entries(form.meals).forEach(([id, v]) => {
      if (!v.gender) e[`gen_${id}`] = "Required";
      if (v.gender === "both") {
        if (!v.boys_cap || parseInt(v.boys_cap) < 1) e[`bcap_${id}`] = "Required";
        if (!v.girls_cap || parseInt(v.girls_cap) < 1) e[`gcap_${id}`] = "Required";
      } else {
        if (!v.capacity || parseInt(v.capacity) < 1) e[`cap_${id}`] = "Required";
      }
    });
    return e;
  };

  const submit = async () => {
    const e = validate(); setErrors(e);
    if (Object.keys(e).length) return;
    setSaving(true);
    const payload = { user_id:profile.id, family_name:profile.family_name, neighborhood:form.neighborhood, address:form.address, gebrokts:form.gebrokts, kitniyot:form.kitniyot, meals:form.meals, notes:form.notes };
    if (editId) {
      await supabase.from("hosts").update({ ...payload, approved:true }).eq("id", editId);
    } else {
      await supabase.from("hosts").insert([{ ...payload, approved:true }]);
    }
    setSaved(true); setShowForm(false); setEditId(null); setForm(blank);
    fetchData(); setSaving(false);
  };

  const getSpotsUsed = (hostId, mealId, gender) => signups.filter(s => s.meals?.[mealId]?.host_id === hostId).reduce((sum, s) => {
    if (gender === "boys") return sum + (parseInt(s.meals[mealId]?.boys) || 0);
    if (gender === "girls") return sum + (parseInt(s.meals[mealId]?.girls) || 0);
    return sum + (parseInt(s.meals[mealId]?.boys) || 0) + (parseInt(s.meals[mealId]?.girls) || 0);
  }, 0);

  if (loading) return <Spin />;

  return (
    <div style={{ paddingTop:40 }}>
      <PageHeader title={`Shalom, ${profile.family_name}`} sub="Host Dashboard" setScreen={setScreen} />

      {saved && !showForm && <Alert type="success">✓ {editId ? "Changes saved! Your listing is live." : "Listing submitted! You are now visible to guests."}</Alert>}

      {myListings.map(l => (
        <div key={l.id} style={{ ...cS, marginBottom:16 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:10 }}>
            <div>
              <div style={{ fontFamily:F.display, color:C.goldLt, fontSize:"1.05rem" }}>{l.family_name}</div>
              <div style={{ fontSize:"0.82rem", color:C.muted, marginTop:3 }}>📍 {l.neighborhood}{l.address?` · ${l.address}`:""}</div>
            </div>
            <div style={{ display:"flex", gap:8, alignItems:"center" }}>
              <span style={pill(C.success)}>Active — Visible to Guests</span>
              <button style={{ ...bG, padding:"5px 14px", fontSize:"0.76rem" }} onClick={() => startEdit(l)}>Edit</button>
            </div>
          </div>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginTop:12 }}>
            <span style={pill(C.muted)}>{l.gebrokts==="yes"?"Gebrokts":"Non-Gebrokts"}</span>
            <span style={pill(C.muted)}>{l.kitniyot==="yes"?"Kitniyot":"Non-Kitniyot"}</span>
          </div>
          <div style={{ marginTop:14 }}>
            {MEALS.filter(m => l.meals?.[m.id]).map(meal => {
              const v = l.meals[meal.id];
              const g = v.gender;
              const gLabel = g==="boys"?"Boys Only":g==="girls"?"Girls Only":"Boys & Girls";
              const boysUsed  = getSpotsUsed(l.id, meal.id, "boys");
              const girlsUsed = getSpotsUsed(l.id, meal.id, "girls");
              const boysCap   = g==="both" ? parseInt(v.boys_cap||0) : g==="boys" ? parseInt(v.capacity||0) : 0;
              const girlsCap  = g==="both" ? parseInt(v.girls_cap||0) : g==="girls" ? parseInt(v.capacity||0) : 0;
              return (
                <div key={meal.id} style={{ marginBottom:10, paddingBottom:10, borderBottom:`1px solid ${C.border}44` }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap", marginBottom:6 }}>
                    <span style={{ color:C.gold, fontSize:"0.85rem" }}>{meal.label}</span>
                    <span style={{ ...pill(C.muted), fontSize:"0.68rem" }}>{gLabel}</span>
                  </div>
                  {(g==="boys"||g==="both") && boysCap > 0 && (
                    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
                      <span style={{ fontSize:"0.75rem", color:C.muted, width:60 }}>Males</span>
                      <div style={{ flex:1, height:5, background:C.border, borderRadius:3 }}>
                        <div style={{ height:5, width:`${Math.min(100,boysUsed/boysCap*100)}%`, background:C.gold, borderRadius:3 }} />
                      </div>
                      <span style={{ fontSize:"0.72rem", color:C.muted }}>{boysUsed}/{boysCap}</span>
                    </div>
                  )}
                  {(g==="girls"||g==="both") && girlsCap > 0 && (
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      <span style={{ fontSize:"0.75rem", color:C.muted, width:60 }}>Females</span>
                      <div style={{ flex:1, height:5, background:C.border, borderRadius:3 }}>
                        <div style={{ height:5, width:`${Math.min(100,girlsUsed/girlsCap*100)}%`, background:C.goldLt, borderRadius:3 }} />
                      </div>
                      <span style={{ fontSize:"0.72rem", color:C.muted }}>{girlsUsed}/{girlsCap}</span>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          {signups.filter(s => Object.values(s.meals||{}).some(v => v.host_id===l.id)).length > 0 && (
            <div style={{ marginTop:16, borderTop:`1px solid ${C.border}`, paddingTop:14 }}>
              <SecTitle>Guests Signed Up</SecTitle>
              {signups.filter(s => Object.values(s.meals||{}).some(v => v.host_id===l.id)).map(g => (
                <div key={g.id} style={{ fontSize:"0.85rem", color:C.cream, marginBottom:8 }}>
                  <div style={{ display:"flex", gap:12, flexWrap:"wrap" }}>
                    <span style={{ fontWeight:600 }}>{g.name}</span>
                    <span style={{ color:C.muted }}>{g.phone}</span>
                    {g.dietary && <span style={{ color:C.muted, fontStyle:"italic" }}>🍽 {g.dietary}</span>}
                  </div>
                  <div style={{ marginTop:4 }}>
                    {Object.entries(g.meals||{}).filter(([,v]) => v.host_id===l.id).map(([mealId,v]) => {
                      const meal = MEALS.find(m => m.id===mealId);
                      return <span key={mealId} style={{ ...pill(C.border), color:C.muted, marginRight:6, fontSize:"0.72rem" }}>{meal?.label}: {v.boys>0?`${v.boys}M`:""}{v.boys>0&&v.girls>0?"+":""}{v.girls>0?`${v.girls}F`:""}</span>;
                    })}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      ))}

      {!showForm && <button style={{ ...bG, marginBottom:24 }} onClick={() => { setForm(blank); setEditId(null); setShowForm(true); }}>+ Add Another Listing</button>}

      {showForm && (
        <div style={cS}>
          <SecTitle>{editId?"Edit Listing":"List Your Home"}</SecTitle>
          <Field label="Neighborhood / Area" error={errors.neighborhood}>
            <input style={iS(errors.neighborhood)} value={form.neighborhood} onChange={e => setForm(f => ({ ...f, neighborhood:e.target.value }))} placeholder="e.g. Rechavia, Katamon, Har Nof…" />
          </Field>
          <Field label="Address" error={errors.address}>
            <input style={iS(errors.address)} value={form.address} onChange={e => setForm(f => ({ ...f, address:e.target.value }))} placeholder="Street address (required — guests need to know where to go)" />
          </Field>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
            <Field label="Gebrokts" error={errors.gebrokts}>
              <Sel value={form.gebrokts} onChange={v => setForm(f => ({ ...f, gebrokts:v }))} err={errors.gebrokts} placeholder="Select…" options={[{value:"yes",label:"Gebrokts"},{value:"no",label:"Non-Gebrokts"}]} />
            </Field>
            <Field label="Kitniyot" error={errors.kitniyot}>
              <Sel value={form.kitniyot} onChange={v => setForm(f => ({ ...f, kitniyot:v }))} err={errors.kitniyot} placeholder="Select…" options={[{value:"yes",label:"Kitniyot"},{value:"no",label:"Non-Kitniyot"}]} />
            </Field>
          </div>
          <Field label="Which Meals Are You Hosting?" error={errors.meals}>
            {MEALS.map(meal => (
              <div key={meal.id} style={{ marginBottom:16, paddingBottom:16, borderBottom:`1px solid ${C.border}44` }}>
                <Checkbox checked={!!form.meals[meal.id]} onChange={() => toggleMeal(meal.id)} label={`${meal.label} (${meal.date})`} />
                {form.meals[meal.id] && (
                  <div style={{ marginTop:12, marginLeft:28 }}>
                    <Field label="Gender Selection" error={errors[`gen_${meal.id}`]}>
                      <Sel value={form.meals[meal.id].gender}
                        onChange={v => updateMealField(meal.id, "gender", v)}
                        err={errors[`gen_${meal.id}`]}
                        placeholder="Select…"
                        options={[{value:"boys",label:"Boys Only"},{value:"girls",label:"Girls Only"},{value:"both",label:"Boys & Girls (separate capacity)"},{value:"mixed",label:"Mixed — No Preference (total seats only)"}]} />
                    </Field>
                    {form.meals[meal.id].gender === "both" && (
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
                        <Field label="# of Males" error={errors[`bcap_${meal.id}`]}>
                          <input style={iS(errors[`bcap_${meal.id}`])} type="number" min="0" max="50" value={form.meals[meal.id].boys_cap||""} onChange={e => updateMealField(meal.id,"boys_cap",e.target.value)} placeholder="0" />
                        </Field>
                        <Field label="# of Females" error={errors[`gcap_${meal.id}`]}>
                          <input style={iS(errors[`gcap_${meal.id}`])} type="number" min="0" max="50" value={form.meals[meal.id].girls_cap||""} onChange={e => updateMealField(meal.id,"girls_cap",e.target.value)} placeholder="0" />
                        </Field>
                      </div>
                    )}
                    {(form.meals[meal.id].gender === "boys" || form.meals[meal.id].gender === "girls" || form.meals[meal.id].gender === "mixed") && (
                      <Field label={form.meals[meal.id].gender === "mixed" ? "Total Seats Available" : `Max ${form.meals[meal.id].gender === "boys" ? "Males" : "Females"}`} error={errors[`cap_${meal.id}`]}>
                        <input style={{ ...iS(errors[`cap_${meal.id}`]), width:100 }} type="number" min="1" max="50" value={form.meals[meal.id].capacity||""} onChange={e => updateMealField(meal.id,"capacity",e.target.value)} placeholder="1" />
                      </Field>
                    )}
                  </div>
                )}
              </div>
            ))}
          </Field>
          <Field label="Additional Notes (optional)">
            <textarea style={{ ...iS(), resize:"vertical", minHeight:80 }} value={form.notes} onChange={e => setForm(f => ({ ...f, notes:e.target.value }))} placeholder="Parking, accessibility, walking distance from shul…" />
          </Field>
          {Object.keys(errors).length > 0 && (
            <div style={{ padding:"12px 16px", background:`${C.error}22`, border:`1px solid ${C.error}55`, borderRadius:8, color:C.error, fontFamily:F.body, fontSize:"0.85rem", marginTop:8 }}>
              ⚠️ Please fix the following before submitting:
              {Object.values(errors).map((err, i) => <div key={i} style={{ marginTop:4 }}>• {err}</div>)}
            </div>
          )}
          <div style={{ display:"flex", gap:12, marginTop:8 }}>
            <button style={{ ...bP, opacity:saving?0.6:1 }} onClick={submit} disabled={saving}>{saving?"Saving…":editId?"Save Changes →":"Submit Listing →"}</button>
            {(myListings.length > 0 || editId) && <button style={bG} onClick={() => { setShowForm(false); setEditId(null); setForm(blank); }}>Cancel</button>}
          </div>
        </div>
      )}
    </div>
  );
}

// ── GUEST DASHBOARD ────────────────────────────────────────────────────────
function GuestDashboard({ profile, setScreen }) {
  const [step,     setStep]     = useState("loading");
  const [info, setInfo] = useState({ name:profile?.name||"", email:profile?.email||"", dietary:"" });
  const [selected, setSelected] = useState({});
  const [errors,   setErrors]   = useState({});
  const [hosts,    setHosts]    = useState([]);
  const [signups,  setSignups]  = useState([]);
  const [search,   setSearch]   = useState({ meal:"", area:"", gebrokts:"", kitniyot:"", gender:"" });
  const [loading,  setLoading]  = useState(false);
  const [mySignup, setMySignup] = useState(null);
  const [saving,   setSaving]   = useState(false);

  useEffect(() => { fetchExisting(); }, []);

  const fetchExisting = async () => {
    const { data } = await supabase.from("signups").select("*").eq("email", profile.email).order("submitted_at", { ascending: false }).limit(1).single();
    if (data) {
      setMySignup(data);
      setInfo({ name:data.name, email:data.email, dietary:data.dietary||"" });
      const sel = {};
      Object.entries(data.meals||{}).forEach(([mealId, v]) => { sel[mealId] = { hostId:v.host_id, boys:String(v.boys||0), girls:String(v.girls||0) }; });
      setSelected(sel);
      setStep("confirmed");
    } else {
      setStep("info");
    }
  };

  const fetchHosts = async () => {
    setLoading(true);
    const [{ data:h }, { data:s }] = await Promise.all([
      supabase.from("hosts").select("*").eq("approved", true),
      supabase.from("signups").select("*"),
    ]);
    setHosts(h||[]); setSignups(s||[]);
    setLoading(false);
  };

  // Refresh signups every 30s when browsing so spots stay current
  useEffect(() => {
    if (step !== "browse") return;
    const interval = setInterval(async () => {
      const { data:s } = await supabase.from("signups").select("*");
      if (s) setSignups(s);
    }, 30000);
    return () => clearInterval(interval);
  }, [step]);

  const spotsLeft = (host, mealId, gender) => {
    const v = host.meals?.[mealId];
    if (!v) return 0;
    const cap = v.gender==="both"
      ? (gender==="boys" ? parseInt(v.boys_cap||0) : parseInt(v.girls_cap||0))
      : parseInt(v.capacity||0); // boys, girls, or mixed all use capacity
    // Count ALL non-rejected, non-expired signups as taking a spot (pending + confirmed)
    const used = signups.filter(s =>
      s.meals?.[mealId]?.host_id===host.id &&
      s.email!==profile.email &&
      s.status !== "rejected" &&
      s.status !== "expired"
    ).reduce((sum, s) => sum + (parseInt(s.meals[mealId]?.[gender])||0), 0);
    return cap - used;
  };

  const mealGender = (host, mealId) => host.meals?.[mealId]?.gender||"mixed";

  const filteredHosts = hosts.filter(h => {
    if (search.meal && !h.meals?.[search.meal]) return false;
    if (search.area && !h.neighborhood.toLowerCase().includes(search.area.toLowerCase())) return false;
    if (search.gebrokts && h.gebrokts !== search.gebrokts) return false;
    if (search.kitniyot && h.kitniyot !== search.kitniyot) return false;
    if (search.gender) {
      // Strict: boys shows ONLY boys, girls shows ONLY girls, both/mixed shows everything
      const hasMatch = Object.values(h.meals || {}).some(v => {
        if (search.gender === "boys") return v.gender === "boys";
        if (search.gender === "girls") return v.gender === "girls";
        return true; // "both" or "mixed" search shows all
      });
      if (!hasMatch) return false;
    }
    return true;
  });

  const validateInfo = () => {
    const e = {};
    if (!info.name.trim()) e.name = "Required";
    if (!info.email.trim()||!info.email.includes("@")) e.email = "Valid email required";
    return e;
  };

  const validateMeals = () => {
    const e = {};
    if (Object.keys(selected).length===0) { e.meals="Please select at least one meal"; return e; }
    Object.entries(selected).forEach(([mealId, v]) => {
      const boys=parseInt(v.boys)||0, girls=parseInt(v.girls)||0;
      if (boys+girls<1) { e[`count_${mealId}`]="Enter at least 1 person"; return; }
      const host = hosts.find(h => h.id===v.hostId);
      if (!host) return;
      const g = mealGender(host, mealId);
      if (g==="boys"&&girls>0) { e[`count_${mealId}`]="This meal is boys only"; return; }
      if (g==="girls"&&boys>0) { e[`count_${mealId}`]="This meal is girls only"; return; }
      if (boys>0&&spotsLeft(host,mealId,"boys")<boys) { e[`count_${mealId}`]=`Only ${spotsLeft(host,mealId,"boys")} male spot(s) left`; return; }
      if (girls>0&&spotsLeft(host,mealId,"girls")<girls) { e[`count_${mealId}`]=`Only ${spotsLeft(host,mealId,"girls")} female spot(s) left`; }
    });
    // Scroll to top of page so user sees errors
    if (Object.keys(e).length) {
    }
    return e;
  };

  const [pendingSignupData, setPendingSignupData] = useState(null);

  const submitSignup = async () => {
    const e = validateMeals(); setErrors(e);
    if (Object.keys(e).length) return;
    setSaving(true);
    const mealsPayload = {};
    Object.entries(selected).forEach(([mealId, v]) => { mealsPayload[mealId]={ host_id:v.hostId, boys:parseInt(v.boys)||0, girls:parseInt(v.girls)||0 }; });
    const totalGuests = Object.values(selected).reduce((max,v)=>Math.max(max,(parseInt(v.boys)||0)+(parseInt(v.girls)||0)),0);
    const now = new Date().toISOString();

    let signupRecord;
    if (mySignup) {
      const { data } = await supabase.from("signups").update({ ...info, phone: profile.phone, group_size:totalGuests, meals:mealsPayload, status:"pending", host_notified_at:now }).eq("id", mySignup.id).select().single();
      signupRecord = data;
    } else {
      const { data } = await supabase.from("signups").insert([{ ...info, phone: profile.phone, group_size:totalGuests, meals:mealsPayload, status:"pending", host_notified_at:now, submitted_at:now }]).select().single();
      signupRecord = data;
    }

    // Build the signup object we'll display — always has status:"pending"
    const displayRecord = signupRecord 
      ? { ...signupRecord, status: "pending" }
      : { ...info, phone: profile.phone, meals: mealsPayload, status: "pending", submitted_at: now };

    setMySignup(displayRecord);
    setPendingSignupData(displayRecord);
    setStep("confirmed");
    setSaving(false);
  };

  const selectHost = (mealId, hostId, g) => {
    setSelected(s => {
      if (s[mealId]?.hostId===hostId) { const n={...s}; delete n[mealId]; return n; }
      return { ...s, [mealId]:{ hostId, boys:g==="girls"?"0":"", girls:g==="boys"?"0":"" } };
    });
  };

  const updateCount = (mealId, field, val) => setSelected(s => ({ ...s, [mealId]:{ ...s[mealId], [field]:val } }));

  if (step==="loading") return <Spin />;

  if (step==="confirmed") {
    const s = pendingSignupData || mySignup;
    const status = "pending"; // Always show pending right after submit
    const statusConfig = {
      pending:   { type:"warn",    icon:"⏳", title:"Request Sent!", msg:"Your meal request has been sent to your host." },
      confirmed: { type:"success", icon:"✅", title:"You're Confirmed!", msg:"Your Pesach meals are confirmed! Your host will be in touch before Yom Tov. Chag Kasher V'Sameach!" },
      rejected:  { type:"error",   icon:"❌", title:"Host Unavailable", msg:"Unfortunately your host is unable to accommodate your request. Please choose a new host below." },
      expired:   { type:"error",   icon:"⚠️", title:"No Response Yet", msg:"Your host hasn't responded in 24 hours. Please choose a new host to make sure you have a place for Yom Tov." },
    };
    const cfg = statusConfig[status] || statusConfig.pending;
    return (
      <div style={{ paddingTop:40 }}>
        <PageHeader title="Your Meals" sub="Pesach 5786" />
        <Alert type={cfg.type}>{cfg.icon} <strong>{cfg.title}</strong> {cfg.msg}</Alert>

        {status === "pending" && (
          <div style={{ ...cS, marginBottom:20, background:`${C.warn}11`, border:`1px solid ${C.warn}44` }}>
            <div style={{ fontFamily:F.head, fontWeight:600, color:C.warn, marginBottom:10, fontSize:"0.95rem" }}>📧 What happens next?</div>
            <div style={{ fontFamily:F.body, fontSize:"0.88rem", color:C.cream, lineHeight:1.8 }}>
              <div style={{ marginBottom:6 }}>1. Your host will receive an email with your request.</div>
              <div style={{ marginBottom:6 }}>2. Once they accept, you will receive a confirmation email with their contact details.</div>
              <div style={{ marginBottom:6 }}>3. If they do not respond within <strong>24 hours</strong>, you will be notified to choose a new host.</div>
              <div style={{ marginTop:10, padding:"10px 14px", background:`${C.warn}18`, borderRadius:8, fontSize:"0.82rem", color:C.warn }}>
                ⚠️ Please check your email (including spam folder) over the next 24 hours.
              </div>
            </div>
          </div>
        )}

        {s && Object.entries(s.meals||{}).map(([mealId,v]) => {
          const meal=MEALS.find(m=>m.id===mealId);
          return (
            <div key={mealId} style={{ ...cS, marginBottom:10 }}>
              <div style={{ color:C.blue, fontFamily:F.head, fontSize:"0.85rem", fontWeight:600 }}>{meal?.label}</div>
              <div style={{ color:C.muted, fontSize:"0.78rem", marginTop:4 }}>{meal?.date}</div>
              <div style={{ color:C.muted, fontSize:"0.78rem", marginTop:2 }}>{v.boys>0?`${v.boys} male`:""}{v.boys>0&&v.girls>0?" · ":""}{v.girls>0?`${v.girls} female`:""}</div>
              <div style={{ marginTop:6 }}>
                <span style={pill(status==="confirmed"?C.success:status==="pending"?C.warn:C.error)}>
                  {status==="confirmed"?"✅ Confirmed":status==="pending"?"⏳ Awaiting host confirmation":"Needs new host"}
                </span>
              </div>
            </div>
          );
        })}
        <div style={{ display:"flex", gap:12, marginTop:24, flexWrap:"wrap" }}>
          {(status === "rejected" || status === "expired") ? (
            <button style={bP} onClick={() => { fetchHosts(); setStep("browse"); }}>Choose New Host →</button>
          ) : (
            <button style={bG} onClick={() => { fetchHosts(); setStep("browse"); }}>Edit / Add Meals</button>
          )}
        </div>
      </div>
    );
  }

  if (step==="info") {
    return (
      <div style={{ paddingTop:40 }}>
        <PageHeader title={`Shalom, ${profile.name}`} sub="Find your Pesach meals" setScreen={setScreen} />
        <div style={cS}>
          <SecTitle>Your Information</SecTitle>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
            <Field label="Full Name" error={errors.name}><input style={iS(errors.name)} value={info.name} onChange={e => setInfo(i => ({ ...i, name:e.target.value }))} /></Field>
            
            <Field label="Email" error={errors.email}><input style={iS(errors.email)} value={info.email} onChange={e => setInfo(i => ({ ...i, email:e.target.value }))} /></Field>
            <Field label="Food Allergies or Restrictions (e.g. nuts, gluten — NOT kashrus)"><input style={iS()} value={info.dietary} onChange={e => setInfo(i => ({ ...i, dietary:e.target.value }))} placeholder="e.g. nut allergy, gluten free, no fish…" /></Field>
          </div>
          <button style={{ ...bP, marginTop:8 }} onClick={() => { const e=validateInfo(); setErrors(e); if(!Object.keys(e).length){ fetchHosts(); setStep("browse"); } }}>Browse Available Hosts →</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ paddingTop:40 }}>
      <PageHeader title="Choose Your Hosts" sub="Select a host and enter the number of males and females per meal" />
      <div style={{ ...cS, marginBottom:24 }}>
        <SecTitle>Filter Hosts</SecTitle>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:14 }}>
          <Field label="Filter by Meal">
            <Sel value={search.meal} onChange={v => setSearch(s => ({ ...s, meal:v }))} placeholder="All meals" options={MEALS.map(m => ({ value:m.id, label:m.label }))} />
          </Field>
          <Field label="Search by Neighborhood">
            <input style={iS()} value={search.area} onChange={e => setSearch(s => ({ ...s, area:e.target.value }))} placeholder="e.g. Katamon, Har Nof, Rechavia…" />
          </Field>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:14 }}>
          <Field label="Gebrokts">
            <Sel value={search.gebrokts} onChange={v => setSearch(s => ({ ...s, gebrokts:v }))} placeholder="Any" options={[{value:"yes",label:"Gebrokts"},{value:"no",label:"Non-Gebrokts"}]} />
          </Field>
          <Field label="Kitniyot">
            <Sel value={search.kitniyot} onChange={v => setSearch(s => ({ ...s, kitniyot:v }))} placeholder="Any" options={[{value:"yes",label:"Kitniyot"},{value:"no",label:"Non-Kitniyot"}]} />
          </Field>
          <Field label="Hosting">
            <Sel value={search.gender} onChange={v => setSearch(s => ({ ...s, gender:v }))} placeholder="Boys & Girls" options={[{value:"boys",label:"Boys Only"},{value:"girls",label:"Girls Only"},{value:"both",label:"Mixed (Boys & Girls)"}]} />
          </Field>
        </div>
        {(search.meal||search.area||search.gebrokts||search.kitniyot||search.gender) && (
          <button onClick={() => setSearch({ meal:"", area:"", gebrokts:"", kitniyot:"", gender:"" })}
            style={{ ...bG, padding:"6px 16px", fontSize:"0.78rem", marginTop:8 }}>
            ✕ Clear Filters
          </button>
        )}
      </div>
      {errors.meals && <Alert type="error">{errors.meals}</Alert>}
      {loading ? <Spin /> : filteredHosts.length===0 ? <Empty text="No hosts found matching your filters." /> : filteredHosts.map(host => {
        const anySelected = Object.values(selected).some(v => v.hostId===host.id);
        return (
          <div key={host.id} style={{ ...cS, marginBottom:16, border:`1px solid ${anySelected?C.gold:C.border}` }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:10 }}>
              <div>
                <div style={{ fontFamily:F.display, color:C.goldLt, fontSize:"1.05rem" }}>{host.family_name}</div>
                <div style={{ color:C.muted, fontSize:"0.82rem", marginTop:3 }}>📍 {host.neighborhood}</div>
              </div>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                <span style={pill(C.muted)}>{host.gebrokts==="yes"?"Gebrokts":"Non-Gebrokts"}</span>
                <span style={pill(C.muted)}>{host.kitniyot==="yes"?"Kitniyot":"Non-Kitniyot"}</span>
              </div>
            </div>
            {host.notes && <div style={{ fontSize:"0.82rem", color:C.muted, fontStyle:"italic", marginTop:8 }}>{host.notes}</div>}
            <div style={{ marginTop:14 }}>
              {MEALS.filter(m => {
                if (!host.meals?.[m.id]) return false;
                // Filter meals within host card by gender search
                if (search.gender === "boys") return host.meals[m.id].gender === "boys";
                if (search.gender === "girls") return host.meals[m.id].gender === "girls";
                return true;
              }).map(meal => {
                const g = mealGender(host, meal.id);
                const gLabel = g==="boys"?"Boys only":g==="girls"?"Girls only":g==="mixed"?"Mixed (any gender)":"Boys & Girls";
                const isTaken = selected[meal.id]&&selected[meal.id].hostId!==host.id;
                const isChosen = selected[meal.id]?.hostId===host.id;
                const sel = selected[meal.id];
                const boysLeft  = spotsLeft(host, meal.id, "boys");
                const girlsLeft = spotsLeft(host, meal.id, "girls");
                const fullBoys  = g!=="girls"&&g!=="mixed"&&boysLeft<=0;
                const fullGirls = g!=="boys"&&g!=="mixed"&&girlsLeft<=0;
                const mixedLeft = g==="mixed" ? parseInt(host.meals[meal.id]?.capacity||0) - signups.filter(s=>s.meals?.[meal.id]?.host_id===host.id&&s.status!=="rejected"&&s.status!=="expired"&&s.email!==profile.email).reduce((sum,s)=>sum+(parseInt(s.meals[meal.id]?.boys)||0)+(parseInt(s.meals[meal.id]?.girls)||0),0) : 0;
                const fullyFull = g==="mixed" ? mixedLeft<=0 : (g==="boys"&&fullBoys)||(g==="girls"&&fullGirls)||(g==="both"&&fullBoys&&fullGirls);
                // Count pending spots to show as "held"
                const boysPending  = signups.filter(s=>s.meals?.[meal.id]?.host_id===host.id&&s.status==="pending"&&s.email!==profile.email).reduce((sum,s)=>sum+(parseInt(s.meals[meal.id]?.boys)||0),0);
                const girlsPending = signups.filter(s=>s.meals?.[meal.id]?.host_id===host.id&&s.status==="pending"&&s.email!==profile.email).reduce((sum,s)=>sum+(parseInt(s.meals[meal.id]?.girls)||0),0);
                return (
                  <div key={meal.id} style={{ padding:"10px 0", borderBottom:`1px solid ${C.border}66` }}>
                    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:8 }}>
                      <div>
                        <span style={{ fontSize:"0.9rem", color:C.cream }}>{meal.label}</span>
                        <span style={{ fontSize:"0.72rem", color:C.muted, marginLeft:8 }}>{meal.date}</span>
                        <span style={{ ...pill(C.muted), marginLeft:8, fontSize:"0.68rem" }}>{gLabel}</span>
                      </div>
                      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                        {g==="mixed"&&<span style={{ fontSize:"0.72rem", color:mixedLeft<=0?C.error:mixedLeft<=2?C.warn:C.success }}>{mixedLeft} seats left</span>}
                        {g!=="girls"&&g!=="mixed"&&<span style={{ fontSize:"0.72rem", color:boysLeft<=0?C.error:boysLeft<=2?C.warn:C.success }}>{boysLeft}M left{boysPending>0?<span style={{color:C.warn}}> · {boysPending} pending</span>:""}</span>}
                        {g!=="boys"&&g!=="mixed"&&<span style={{ fontSize:"0.72rem", color:girlsLeft<=0?C.error:girlsLeft<=2?C.warn:C.success }}>{girlsLeft}F left{girlsPending>0?<span style={{color:C.warn}}> · {girlsPending} pending</span>:""}</span>}
                        {!fullyFull&&!isTaken&&(
                          <button onClick={() => selectHost(meal.id, host.id, g)} style={{ ...(isChosen?bP:bG), padding:"5px 14px", fontSize:"0.78rem" }}>
                            {isChosen?"✓ Selected":"Select"}
                          </button>
                        )}
                        {fullyFull&&!isChosen&&<span style={{ fontSize:"0.75rem", color:C.error }}>Full</span>}
                        {isTaken&&<span style={{ fontSize:"0.75rem", color:C.muted, fontStyle:"italic" }}>Another host selected</span>}
                      </div>
                    </div>
                    {isChosen && (
                      <div style={{ marginTop:10, marginLeft:4, display:"flex", gap:16, flexWrap:"wrap", alignItems:"flex-end" }}>
                        {(g==="boys"||g==="both"||g==="mixed")&&(
                          <div>
                            <label style={{ ...lS, fontSize:"0.65rem" }}>Males</label>
                            <input style={{ ...iS(errors[`count_${meal.id}`]), width:75, padding:"7px 10px" }} type="number" min="0" max="10" value={sel?.boys??""} onChange={e => updateCount(meal.id,"boys",e.target.value)} placeholder="0" />
                          </div>
                        )}
                        {(g==="girls"||g==="both"||g==="mixed")&&(
                          <div>
                            <label style={{ ...lS, fontSize:"0.65rem" }}>Females</label>
                            <input style={{ ...iS(errors[`count_${meal.id}`]), width:75, padding:"7px 10px" }} type="number" min="0" max="10" value={sel?.girls??""} onChange={e => updateCount(meal.id,"girls",e.target.value)} placeholder="0" />
                          </div>
                        )}
                        {errors[`count_${meal.id}`]&&<span style={{ color:C.error, fontSize:"0.78rem" }}>{errors[`count_${meal.id}`]}</span>}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
      {Object.keys(selected).length>0&&(
        <div style={{ ...cS, marginTop:24, background:`${C.gold}11`, border:`1px solid ${C.gold}44` }}>
          <SecTitle>Your Selections</SecTitle>
          {Object.entries(selected).map(([mealId,v]) => {
            const host=hosts.find(h=>h.id===v.hostId);
            const meal=MEALS.find(m=>m.id===mealId);
            const boys=parseInt(v.boys)||0, girls=parseInt(v.girls)||0;
            return (
              <div key={mealId} style={{ display:"flex", justifyContent:"space-between", fontSize:"0.88rem", marginBottom:8, flexWrap:"wrap", gap:8 }}>
                <span style={{ color:C.goldLt }}>{meal?.label}</span>
                <span style={{ color:C.cream }}>{host?.family_name}</span>
                <span style={{ color:C.muted }}>{boys>0?`${boys}M`:""}{boys>0&&girls>0?"+":""}{girls>0?`${girls}F`:""}</span>
              </div>
            );
          })}
          <button style={{ ...bP, width:"100%", marginTop:14, opacity:saving?0.6:1 }} onClick={submitSignup} disabled={saving}>{saving?"Saving…":mySignup?"Update My Signup →":"Confirm Signup →"}</button>
          {Object.keys(errors).length > 0 && (
            <div style={{ marginTop:12, padding:"12px 16px", background:`${C.error}22`, border:`1px solid ${C.error}55`, borderRadius:8, color:C.error, fontFamily:F.body, fontSize:"0.85rem" }}>
              ⚠️ Please fix the errors above before submitting.
              {Object.values(errors).map((err, i) => <div key={i} style={{ marginTop:4 }}>• {err}</div>)}
            </div>
          )}
        </div>
      )}
      <button style={{ ...bG, marginTop:20 }} onClick={() => setStep(mySignup?"confirmed":"info")}>← Back</button>
    </div>
  );
}

// ── ADMIN DASHBOARD ────────────────────────────────────────────────────────
function AdminDashboard({ setScreen, logout }) {
  const [authed,  setAuthed]  = useState(false);
  const [pw,      setPw]      = useState("");
  const [pwErr,   setPwErr]   = useState(false);
  const [tab,     setTab]     = useState("pending");
  const [hosts,   setHosts]   = useState([]);
  const [signups, setSignups] = useState([]);
  const [users,   setUsers]   = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => { if (authed) fetchAll(); }, [authed]);

  const fetchAll = async () => {
    setLoading(true);
    const [{ data:h },{ data:s },{ data:u }] = await Promise.all([
      supabase.from("hosts").select("*").order("created_at",{ascending:false}),
      supabase.from("signups").select("*").order("submitted_at",{ascending:false}),
      supabase.from("users").select("*"),
    ]);
    setHosts(h||[]); setSignups(s||[]); setUsers(u||[]);
    setLoading(false);
  };

  const approveHost   = async (id) => { await supabase.from("hosts").update({approved:true}).eq("id",id);  fetchAll(); };
  const unapproveHost = async (id) => { await supabase.from("hosts").update({approved:false}).eq("id",id); fetchAll(); };
  const removeHost    = async (id) => { await supabase.from("hosts").delete().eq("id",id); fetchAll(); };

  const exportCSV = () => {
    if (!signups.length) return;
    const hn=(id)=>(s)=>s.meals?.[id]?(hosts.find(h=>h.id===s.meals[id].host_id)?.family_name||""):"";
    const hd=(id)=>(s)=>{ const v=s.meals?.[id]; if(!v) return ""; return [v.boys>0?`${v.boys}M`:"",v.girls>0?`${v.girls}F`:""].filter(Boolean).join("+"); };
    const headers=["Name","Phone","Email","Dietary",...MEALS.flatMap(m=>[m.label+" Host",m.label+" Count"]),"Submitted"];
    const rows=signups.map(s=>[
      s.name,s.phone,s.email,s.dietary||"",
      ...MEALS.flatMap(m=>[hn(m.id)(s),hd(m.id)(s)]),
      new Date(s.submitted_at).toLocaleString(),
    ].map(v=>`"${String(v).replace(/"/g,'""')}"`));
    const csv=[headers.join(","),...rows.map(r=>r.join(","))].join("\n");
    const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"})); a.download="pesach-signups.csv"; a.click();
  };

  if (!authed) {
    return (
      <div style={{ maxWidth:380, margin:"80px auto 0" }}>
        <PageHeader title="Admin Access" />
        <div style={cS}>
          <Field label="Password">
            <input style={iS(pwErr)} type="password" value={pw} onChange={e=>{setPw(e.target.value);setPwErr(false);}} onKeyDown={e=>e.key==="Enter"&&(pw===ADMIN_PASSWORD?(setAuthed(true),setPwErr(false)):setPwErr(true))} placeholder="Admin password" />
          </Field>
          {pwErr&&<Alert type="error">Incorrect password</Alert>}
          <button style={{...bP,width:"100%"}} onClick={()=>pw===ADMIN_PASSWORD?(setAuthed(true),setPwErr(false)):setPwErr(true)}>Enter →</button>
          <button style={{...bG,width:"100%",marginTop:10}} onClick={()=>setScreen("landing")}>← Back</button>
        </div>
      </div>
    );
  }

  const pending=hosts.filter(h=>!h.approved), approved=hosts.filter(h=>h.approved);
  const tabs=[{id:"pending",label:`Pending (${pending.length})`},{id:"approved",label:`Approved (${approved.length})`},{id:"signups",label:`Signups (${signups.length})`},{id:"stats",label:"Stats"}];

  return (
    <div style={{ paddingTop:40 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:28, flexWrap:"wrap", gap:12 }}>
        <PageHeader title="Admin Dashboard" sub="Pesach 5786 · Amudim" noMargin />
        <div style={{ display:"flex", gap:10 }}>
          <button style={{...bP,padding:"8px 18px",fontSize:"0.78rem"}} onClick={exportCSV}>⬇ Export CSV</button>
          <button style={{...bG,padding:"8px 18px",fontSize:"0.78rem"}} onClick={fetchAll}>↻ Refresh</button>
          <button style={{...bG,padding:"8px 18px",fontSize:"0.78rem"}} onClick={logout}>Sign Out</button>
        </div>
      </div>
      <div style={{ display:"flex", gap:8, marginBottom:24, flexWrap:"wrap" }}>
        {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{...(tab===t.id?bP:bG),padding:"7px 18px",fontSize:"0.78rem"}}>{t.label}</button>)}
      </div>
      {loading?<Spin />:(
        <>
          {tab==="pending"&&(pending.length===0?<Empty text="No pending host listings." />:pending.map(h=><AdminHostCard key={h.id} host={h} onApprove={()=>approveHost(h.id)} onRemove={()=>removeHost(h.id)} signups={signups} />))}
          {tab==="approved"&&(approved.length===0?<Empty text="No approved hosts yet." />:approved.map(h=><AdminHostCard key={h.id} host={h} approved onUnapprove={()=>unapproveHost(h.id)} onRemove={()=>removeHost(h.id)} signups={signups} />))}
          {tab==="signups"&&(signups.length===0?<Empty text="No guest signups yet." />:signups.map(s=>(
            <div key={s.id} style={{...cS,marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                <div>
                  <div style={{fontFamily:F.head,color:C.blue,fontWeight:600,fontSize:"1rem"}}>{s.name}</div>
                  <div style={{fontSize:"0.82rem",color:C.muted,marginTop:3}}>📞 {s.phone || "No phone"}</div>
                  <div style={{fontSize:"0.82rem",color:C.muted}}>✉️ {s.email}</div>
                  {s.dietary&&<div style={{fontSize:"0.78rem",color:C.muted,fontStyle:"italic",marginTop:2}}>🍽 {s.dietary}</div>}
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
                  <span style={pill(s.status==="confirmed"?C.success:s.status==="rejected"||s.status==="expired"?C.error:C.warn)}>
                    {s.status==="confirmed"?"✅ Confirmed":s.status==="rejected"?"❌ Rejected":s.status==="expired"?"⚠️ Expired":"⏳ Pending"}
                  </span>
                  <span style={pill(C.blue)}>Group: {s.group_size || 1} guest{(s.group_size||1)!==1?"s":""}</span>
                </div>
              </div>
              <div style={{marginTop:12,borderTop:`1px solid ${C.border}`,paddingTop:10}}>
                <div style={{fontSize:"0.7rem",letterSpacing:"0.12em",color:C.blue,fontFamily:F.head,fontWeight:600,marginBottom:8}}>MEAL ASSIGNMENTS</div>
                {Object.entries(s.meals||{}).map(([mealId,v])=>{
                  const host=hosts.find(h=>h.id===v.host_id);
                  const meal=MEALS.find(m=>m.id===mealId);
                  return (
                    <div key={mealId} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,flexWrap:"wrap",gap:6}}>
                      <div>
                        <span style={{fontSize:"0.82rem",color:C.cream,fontWeight:500}}>{meal?.label}</span>
                        <span style={{fontSize:"0.72rem",color:C.muted,marginLeft:8}}>{meal?.date}</span>
                      </div>
                      <div style={{display:"flex",gap:8,alignItems:"center"}}>
                        <span style={{fontSize:"0.82rem",color:C.muted}}>{host?.family_name||"?"} · {host?.neighborhood||""}</span>
                        <span style={{...pill(C.border),color:C.muted,fontSize:"0.72rem"}}>{v.boys>0?`${v.boys}M`:""}{v.boys>0&&v.girls>0?"+":""}{v.girls>0?`${v.girls}F`:""}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
              <div style={{fontSize:"0.7rem",color:`${C.muted}88`,marginTop:8}}>Submitted: {new Date(s.submitted_at).toLocaleString()}</div>
            </div>
          )))}
          {tab==="stats"&&(
            <div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:14,marginBottom:28}}>
                {[
                  {n:users.filter(u=>u.role==="host").length, l:"Hosts Registered"},
                  {n:users.filter(u=>u.role==="guest").length,l:"Guests Registered"},
                  {n:approved.length,                         l:"Hosts Approved"},
                  {n:signups.length,                          l:"Total Signups"},
                  {n:signups.reduce((s,r)=>s+(parseInt(r.group_size)||0),0),l:"Total Guests"},
                ].map((s,i)=>(
                  <div key={i} style={cS}>
                    <div style={{fontFamily:F.display,fontSize:"2rem",color:C.gold}}>{s.n}</div>
                    <div style={{fontSize:"0.75rem",color:C.muted,marginTop:4}}>{s.l}</div>
                  </div>
                ))}
              </div>
              <SecTitle>Meal Breakdown</SecTitle>
              {MEALS.map(meal=>{
                const boys=signups.reduce((s,r)=>s+(parseInt(r.meals?.[meal.id]?.boys)||0),0);
                const girls=signups.reduce((s,r)=>s+(parseInt(r.meals?.[meal.id]?.girls)||0),0);
                const boysCap=approved.reduce((s,h)=>{const v=h.meals?.[meal.id]; if(!v) return s; return s+(v.gender==="both"?parseInt(v.boys_cap||0):v.gender==="boys"?parseInt(v.capacity||0):0);},0);
                const girlsCap=approved.reduce((s,h)=>{const v=h.meals?.[meal.id]; if(!v) return s; return s+(v.gender==="both"?parseInt(v.girls_cap||0):v.gender==="girls"?parseInt(v.capacity||0):0);},0);
                return (
                  <div key={meal.id} style={{...cS,marginBottom:12}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:8,flexWrap:"wrap",gap:8}}>
                      <span style={{color:C.goldLt}}>{meal.label}</span>
                      <span style={{fontSize:"0.78rem",color:C.muted}}>{boys}M / {boysCap}M cap · {girls}F / {girlsCap}F cap</span>
                    </div>
                    {boysCap>0&&<div style={{marginBottom:4}}>
                      <div style={{fontSize:"0.72rem",color:C.muted,marginBottom:3}}>Males</div>
                      <div style={{height:6,background:C.border,borderRadius:3}}><div style={{height:6,width:`${Math.min(100,boys/boysCap*100)}%`,background:C.gold,borderRadius:3}}/></div>
                    </div>}
                    {girlsCap>0&&<div>
                      <div style={{fontSize:"0.72rem",color:C.muted,marginBottom:3}}>Females</div>
                      <div style={{height:6,background:C.border,borderRadius:3}}><div style={{height:6,width:`${Math.min(100,girls/girlsCap*100)}%`,background:C.goldLt,borderRadius:3}}/></div>
                    </div>}
                  </div>
                );
              })}
            </div>
          )}
        </>
      )}
    </div>
  );
}

function AdminHostCard({ host, approved, onApprove, onUnapprove, onRemove, signups=[] }) {
  const guestCount=signups.filter(s=>Object.values(s.meals||{}).some(v=>v.host_id===host.id)).reduce((sum,s)=>{
    return sum+Object.values(s.meals||{}).filter(v=>v.host_id===host.id).reduce((ms,v)=>ms+(parseInt(v.boys)||0)+(parseInt(v.girls)||0),0);
  },0);
  return (
    <div style={{...cS,marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontFamily:F.display,color:C.goldLt}}>{host.family_name}</div>
          <div style={{fontSize:"0.82rem",color:C.muted,marginTop:3}}>📍 {host.neighborhood}{host.address?` · ${host.address}`:""}</div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {!approved&&<button style={{...bP,padding:"6px 16px",fontSize:"0.78rem"}} onClick={onApprove}>✓ Approve</button>}
          {approved&&<button style={{...bG,padding:"6px 14px",fontSize:"0.78rem"}} onClick={onUnapprove}>Unapprove</button>}
          <button style={{background:`${C.error}22`,border:`1px solid ${C.error}66`,color:C.error,padding:"6px 14px",borderRadius:6,cursor:"pointer",fontSize:"0.78rem"}} onClick={onRemove}>Remove</button>
        </div>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:10}}>
        <span style={pill(C.muted)}>{host.gebrokts==="yes"?"Gebrokts":"Non-Gebrokts"}</span>
        <span style={pill(C.muted)}>{host.kitniyot==="yes"?"Kitniyot":"Non-Kitniyot"}</span>
        {approved&&<span style={pill(C.gold)}>{guestCount} guest{guestCount!==1?"s":""} signed up</span>}
      </div>
      <div style={{marginTop:10}}>
        {MEALS.filter(m=>host.meals?.[m.id]).map(m=>{
          const v=host.meals[m.id];
          const g=v.gender;
          const cap=g==="both"?`${v.boys_cap||0}M / ${v.girls_cap||0}F`:g==="boys"?`${v.capacity||0}M`:`${v.capacity||0}F`;
          const gLabel=g==="boys"?"Boys":g==="girls"?"Girls":"Boys & Girls";
          return <span key={m.id} style={{...pill(C.border),marginRight:6,marginBottom:4,color:C.muted,display:"inline-block"}}>{m.label} · {gLabel} · {cap}</span>;
        })}
      </div>
      {host.notes&&<div style={{fontSize:"0.8rem",color:C.muted,fontStyle:"italic",marginTop:8}}>{host.notes}</div>}
    </div>
  );
}
